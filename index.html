<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Productos</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4 md:p-8">
    <div class="max-w-5xl mx-auto">
        <h1 class="text-3xl font-bold text-blue-700 mb-6">Catálogo de Productos</h1>

        <div id="section-login" class="bg-white p-6 rounded-lg shadow-md mb-6">
            <h2 class="text-xl font-semibold mb-4 text-gray-700">Identificación</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <input id="user" type="text" placeholder="Usuario" class="border p-2 rounded w-full">
                <input id="pass" type="password" placeholder="Contraseña" class="border p-2 rounded w-full">
                <button onclick="login()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded transition">Entrar</button>
            </div>
        </div>

        <div id="section-app" class="hidden space-y-6">
            <div class="bg-blue-50 p-4 rounded-lg flex justify-between items-center border border-blue-200">
                <div>
                    <span class="font-bold text-blue-800">Bienvenido:</span> <span id="display-user"></span> 
                    <span id="display-badge" class="ml-2 px-2 py-1 text-xs rounded-full"></span>
                    <p id="display-email" class="text-sm text-blue-600 italic"></p>
                </div>
                <button onclick="logout()" class="text-red-600 text-sm font-semibold hover:underline">Cerrar Sesión</button>
            </div>

            <div id="admin-controls" class="hidden bg-white p-6 rounded-lg shadow-md">
                <h2 class="text-xl font-bold mb-4 text-green-700 text-center">Registrar Nuevo Producto</h2>
                <div class="grid grid-cols-2 gap-4">
                    <input id="f-nombre" type="text" placeholder="Nombre" class="border p-2 rounded">
                    <input id="f-desc" type="text" placeholder="Descripción" class="border p-2 rounded">
                    <input id="f-sub" type="text" placeholder="Subcategoría" class="border p-2 rounded">
                    <input id="f-estado" type="text" placeholder="Estado (activo/inactivo)" class="border p-2 rounded">
                    <input id="f-precio" type="number" placeholder="Precio" class="border p-2 rounded">
                    <input id="f-precioq" type="number" placeholder="Precio x Cantidad" class="border p-2 rounded">
                </div>
                <button onclick="guardarProducto()" class="mt-4 w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2 rounded">Guardar Producto</button>
            </div>
            <div class="bg-white p-4 rounded-lg shadow-sm mb-4 flex flex-wrap gap-4 items-end">
    <div class="flex-1">
        <label class="block text-xs font-bold text-gray-600 uppercase">Buscar por nombre</label>
        <input type="text" id="filtroNombre" placeholder="Ej: Monitor..." 
               class="w-full mt-1 border rounded px-3 py-2 text-sm focus:ring-2 focus:ring-blue-400 outline-none">
    </div>
    <button onclick="cargarProductos()" 
            class="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700 transition font-bold text-sm">
        Filtrar
    </button>
</div>
            <div class="bg-white p-6 rounded-lg shadow-md overflow-x-auto">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold text-gray-800">Inventario Actual</h2>
                    <button onclick="cargarProductos()" class="bg-gray-200 hover:bg-gray-300 px-3 py-1 rounded text-sm">Refrescar Tabla</button>
                </div>
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="p-3 border-b">ID</th>
                            <th class="p-3 border-b">Producto</th>
                            <th class="p-3 border-b">Precio</th>
                            <th class="p-3 border-b">Estado</th>
                            <th class="p-3 border-b text-center">Acción</th>
                        </tr>
                    </thead>
                    <tbody id="lista-productos" class="divide-y divide-gray-200"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const apiBaseUrl = window.location.origin === 'null' ? 'http://127.0.0.1:3000' : window.location.origin;
        let token = "";
        let userRole = "";
        let editandoID = null;

        function guardarSesion(payload, jwtToken) {
            token = jwtToken;
            userRole = payload.rol;
            localStorage.setItem('token', jwtToken);
            localStorage.setItem('userRole', payload.rol);
            localStorage.setItem('usuario', payload.usuario);
            localStorage.setItem('email', payload.email || '');
        }

        function limpiarSesion() {
            token = "";
            userRole = "";
            editandoID = null;
            localStorage.removeItem('token');
            localStorage.removeItem('userRole');
            localStorage.removeItem('usuario');
            localStorage.removeItem('email');
            document.getElementById('section-login').classList.remove('hidden');
            document.getElementById('section-app').classList.add('hidden');
            document.getElementById('display-user').innerText = "";
            document.getElementById('display-email').innerText = "";
            document.getElementById('display-badge').innerText = "";
            document.getElementById('admin-controls').classList.add('hidden');
            resetearFormulario();
        }

        function logout() {
            limpiarSesion();
        }

        function restaurarSesion() {
            const storedToken = localStorage.getItem('token');
            const storedRole = localStorage.getItem('userRole');
            const storedUsuario = localStorage.getItem('usuario');
            const storedEmail = localStorage.getItem('email');
            if (!storedToken || !storedRole) return false;

            token = storedToken;
            userRole = storedRole;
            document.getElementById('display-user').innerText = storedUsuario || '';
            document.getElementById('display-email').innerText = storedEmail || '';
            document.getElementById('display-badge').innerText = userRole.toUpperCase();
            const badge = document.getElementById('display-badge');
            if(userRole === 'administrador') {
                badge.className = 'bg-purple-200 text-purple-800 ml-2 px-2 py-1 text-xs rounded-full';
                document.getElementById('admin-controls').classList.remove('hidden');
            } else {
                badge.className = 'bg-gray-200 text-gray-800 ml-2 px-2 py-1 text-xs rounded-full';
                document.getElementById('admin-controls').classList.add('hidden');
            }
            document.getElementById('section-login').classList.add('hidden');
            document.getElementById('section-app').classList.remove('hidden');
            cargarProductos();
            return true;
        }

        function initApp() {
            restaurarSesion();
        }

        async function login() {
        const usuario = document.getElementById('user').value;
        const password = document.getElementById('pass').value;

        try {
            const res = await fetch(`${apiBaseUrl}/auth`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ usuario, password })
            });

            const result = await res.json();

            if (res.ok) {
                const jwtToken = result.data.access_token;
                const base64Url = jwtToken.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const payload = JSON.parse(window.atob(base64));

                guardarSesion(payload, jwtToken);

                document.getElementById('display-user').innerText = payload.usuario;
                document.getElementById('display-email').innerText = payload.email;
                document.getElementById('display-badge').innerText = userRole.toUpperCase();
                
                const badge = document.getElementById('display-badge');
                if(userRole === 'administrador') {
                    badge.className = 'bg-purple-200 text-purple-800 ml-2 px-2 py-1 text-xs rounded-full';
                    document.getElementById('admin-controls').classList.remove('hidden');
                } else {
                    badge.className = 'bg-gray-200 text-gray-800 ml-2 px-2 py-1 text-xs rounded-full';
                    document.getElementById('admin-controls').classList.add('hidden');
                }

                document.getElementById('section-login').classList.add('hidden');
                document.getElementById('section-app').classList.remove('hidden');
                cargarProductos();
            } else {
                alert("Error: " + (result.detail?.error?.message || "Credenciales incorrectas"));
            }
        } catch (e) {
            alert("Error de conexión con el servidor.");
        }
    }

async function cargarProductos() {
    // Usamos el token global que obtuviste en el login
    if (!token) return;

    const nombre = document.getElementById('filtroNombre').value;
    
    // Construimos la URL con el filtro de nombre
    let url = `${apiBaseUrl}/productos?page=1&limit=50`;
    if (nombre) {
        url += `&nombre=${encodeURIComponent(nombre)}`;
    }

    try {
        const response = await fetch(url, {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        
        if (!response.ok) {
            if (response.status === 401) {
                alert("Sesión expirada o token inválido. Inicia sesión nuevamente.");
                logout();
                return;
            } else {
                alert("Error al cargar productos: " + response.status + " " + response.statusText);
                return;
            }
        }

        const result = await response.json();
        const productos = result.data; // Accedemos a la llave 'data' del Nivel 3

        const tabla = document.getElementById('lista-productos');
        tabla.innerHTML = "";

        if (!productos || productos.length === 0) {
            tabla.innerHTML = `<tr><td colspan="5" class="text-center p-4">No se encontraron productos</td></tr>`;
            return;
        }

        productos.forEach(p => {
            // Lógica para mostrar botones según el rol
            let botones = ``;

            // SOLO el admin ve Editar y Eliminar
            if (userRole === 'administrador') {
                botones += `
                    <button onclick='prepararEdicion(${JSON.stringify(p)})' class="text-yellow-600 font-bold mr-2">Editar</button>
                    <button onclick="eliminarProducto(${p.id})" class="text-red-600 font-bold">Eliminar</button>
                `;
            }

            tabla.innerHTML += `
                <tr class="border-b">
                    <td class="p-3">${p.id}</td>
                    <td class="p-3">
                        <div class="font-bold">${p.nombre}</div>
                        <div class="text-xs text-gray-400">${p.subcategoria}</div>
                    </td>
                    <td class="p-3">$${p.precio} <br> <small class="text-blue-500">M: $${p.precioxcantidad}</small></td>
                    <td class="p-3">${p.estado}</td>
                    <td class="p-3 text-center">${botones}</td>
                </tr>`;
        });
    } catch (e) {
        console.error("Error:", e);
        alert("Error de conexión con el servidor.");
    }
}


    async function guardarProducto() {
        const data = {
            nombre: document.getElementById('f-nombre').value,
            descripcion: document.getElementById('f-desc').value,
            subcategoria: document.getElementById('f-sub').value,
            estado: document.getElementById('f-estado').value,
            precio: parseFloat(document.getElementById('f-precio').value) || 0,
            precioxcantidad: parseFloat(document.getElementById('f-precioq').value) || 0
        };

        const url = editandoID ? `${apiBaseUrl}/productos/${editandoID}` : `${apiBaseUrl}/productos`; 
        const metodo = editandoID ? 'PUT' : 'POST';

        const res = await fetch(url, {
            method: metodo,
            headers: { 
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify(data)
        });

        if(res.ok) {
            alert(editandoID ? "¡Producto actualizado!" : "¡Producto creado!");
            resetearFormulario();
            cargarProductos();
        } else {
            try {
                const error = await res.json();
                alert("Error: " + (error.detail?.error?.message || "Error al guardar"));
            } catch {
                alert("Error: " + res.status + " " + res.statusText);
            }
        }
    }

    function prepararEdicion(p) {
        editandoID = p.id;
        document.getElementById('f-nombre').value = p.nombre;
        document.getElementById('f-desc').value = p.descripcion;
        document.getElementById('f-sub').value = p.subcategoria;
        document.getElementById('f-estado').value = p.estado;
        document.getElementById('f-precio').value = p.precio;
        document.getElementById('f-precioq').value = p.precioxcantidad;

        const btn = document.querySelector('#admin-controls button');
        btn.innerText = "Actualizar Producto #" + p.id;
        btn.className = "mt-4 w-full bg-yellow-600 hover:bg-yellow-700 text-white font-bold py-2 rounded";
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function resetearFormulario() {
        editandoID = null;
        document.querySelectorAll('#admin-controls input').forEach(i => i.value = "");
        const btn = document.querySelector('#admin-controls button');
        btn.innerText = "Guardar Producto";
        btn.className = "mt-4 w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2 rounded";
    }

    async function eliminarProducto(id) {
        if(!confirm("¿Eliminar producto?")) return;
        const res = await fetch(`${apiBaseUrl}/productos/${id}`, {
            method: 'DELETE',
            headers: { 'Authorization': `Bearer ${token}` }
        });
        if(res.ok) cargarProductos();
        else {
            try {
                const error = await res.json();
                alert("Error: " + (error.detail?.error?.message || "Error al eliminar"));
            } catch {
                alert("Error: " + res.status + " " + res.statusText);
            }
        }
    }

    window.addEventListener('DOMContentLoaded', initApp);
</script>
</body>
</html>
